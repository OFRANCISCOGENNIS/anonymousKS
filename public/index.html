<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultor Nutricional IA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1B5E42;
      --primary-mid:   #2D6A4F;
      --secondary:     #40916C;
      --accent:        #F4A261;
      --bg:            #EEF5F1;
      --surface:       #FFFFFF;
      --border:        #C8DDD4;
      --text:          #17201B;
      --muted:         #6B7A72;
      --user-bg:       #2D6A4F;
      --user-text:     #FFFFFF;
      --bot-bg:        #FFFFFF;
      --bot-text:      #17201B;
      --radius-lg:     20px;
      --radius-sm:     10px;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.07);
      --shadow-md:     0 4px 14px rgba(0,0,0,.09);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: var(--shadow-md);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,.14);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.2px;
    }

    .header-info p {
      font-size: 11px;
      opacity: .65;
      margin-top: 1px;
    }

    .btn-reset {
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
      padding: 6px 15px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background .18s;
    }
    .btn-reset:hover { background: rgba(255,255,255,.24); }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      text-align: center;
      animation: fadeUp .4s ease;
    }

    .empty-icon {
      width: 70px;
      height: 70px;
      background: var(--primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: var(--shadow-md);
    }

    .empty-state h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }

    .empty-state p {
      color: var(--muted);
      font-size: 14px;
      max-width: 320px;
      line-height: 1.55;
    }

    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 380px;
      width: 100%;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 13px 12px;
      text-align: left;
      cursor: pointer;
      transition: all .18s;
      font-family: inherit;
    }

    .suggestion-btn:hover {
      border-color: var(--secondary);
      box-shadow: var(--shadow-sm);
      transform: translateY(-2px);
    }

    .suggestion-btn .s-icon { font-size: 20px; margin-bottom: 5px; display: block; }
    .suggestion-btn .s-text { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35; }

    /* ── MESSAGES ── */
    .msg {
      display: flex;
      gap: 9px;
      max-width: 86%;
      animation: fadeUp .3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .msg.bot  .avatar { background: var(--primary); }
    .msg.user .avatar { background: var(--secondary); }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      box-shadow: var(--shadow-sm);
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      color: var(--bot-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Markdown inside bot bubble */
    .bubble h2 { font-size: 14px; font-weight: 700; color: var(--primary); margin: 12px 0 4px; }
    .bubble h3 { font-size: 14px; font-weight: 700; color: var(--primary-mid); margin: 10px 0 4px; }
    .bubble h4 { font-size: 13px; font-weight: 700; margin: 8px 0 3px; }
    .bubble h2:first-child,
    .bubble h3:first-child,
    .bubble h4:first-child { margin-top: 0; }
    .bubble p { margin: 5px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }
    .bubble strong { font-weight: 700; }
    .bubble em     { font-style: italic; }
    .bubble code   { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 5px; font-family: 'SF Mono', monospace; font-size: 12px; }
    .bubble hr     { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* ── TYPING INDICATOR ── */
    .typing {
      display: flex;
      gap: 9px;
      align-items: center;
      align-self: flex-start;
      animation: fadeUp .3s ease;
    }

    .typing-dots {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 13px 16px;
      display: flex;
      gap: 5px;
      box-shadow: var(--shadow-sm);
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0%, 60%, 100% { transform: translateY(0); opacity: .5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── ERROR BANNER ── */
    .error-banner {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      color: #B91C1C;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    /* ── INPUT AREA ── */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 11px 14px 14px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 9px 9px 9px 15px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-row:focus-within {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(64,145,108,.12);
    }

    .input-row textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      max-height: 120px;
      min-height: 22px;
      line-height: 1.5;
    }

    .input-row textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .18s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) { background: var(--primary-mid); transform: scale(1.07); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      .msg { max-width: 93%; }
      .suggestion-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <div class="header-icon">🥗</div>
      <div class="header-info">
        <h1>Consultor Nutricional</h1>
        <p>Baseado em evidência · IA</p>
      </div>
    </div>
    <button class="btn-reset" onclick="resetChat()">Nova Consulta</button>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🥗</div>
      <h2>Consultor Nutricional</h2>
      <p>Faço triagem do seu perfil e entrego orientações baseadas em evidência. Não substituo nutricionista — indico quando encaminhar.</p>
      <div class="suggestion-grid">
        <button class="suggestion-btn" onclick="quickSend('Quero perder peso com saúde')">
          <span class="s-icon">⚖️</span>
          <span class="s-text">Perder peso com saúde</span>
        </button>
        <button class="suggestion-btn" onclick="quickSend('Quero ganhar massa muscular')">
          <span class="s-icon">💪</span>
          <span class="s-text">Ganhar massa muscular</span>
        </button>
        <button class="suggestion-btn" onclick="quickSend('Quero melhorar minha energia e disposição')">
          <span class="s-icon">⚡</span>
          <span class="s-text">Melhorar energia</span>
        </button>
        <button class="suggestion-btn" onclick="quickSend('Quero adotar uma alimentação plant-based')">
          <span class="s-icon">🌱</span>
          <span class="s-text">Alimentação plant-based</span>
        </button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="Descreva seu objetivo ou tire uma dúvida..."
        rows="1"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="disclaimer">⚠️ Não substitui nutricionista ou médico. Consulte um profissional de saúde.</p>
  </div>

  <script>
    // ── State ──
    let apiMessages = [];   // conversation sent to the API
    let isLoading   = false;

    // Hidden init message that opens the conversation correctly
    const INIT_USER_MSG = 'Olá! Quero começar minha consulta nutricional.';

    // ── Startup ──
    document.addEventListener('DOMContentLoaded', startChat);

    async function startChat() {
      setSendLoading(true);
      showTyping();

      // Pre-load: trigger the greeting from the API
      apiMessages = [{ role: 'user', content: INIT_USER_MSG }];

      try {
        const text = await streamBotMessage();
        apiMessages.push({ role: 'assistant', content: text });
      } catch (err) {
        hideTyping();
        showError('Não foi possível conectar. Verifique se o servidor está rodando e se a ANTHROPIC_API_KEY está configurada no arquivo .env');
      } finally {
        setSendLoading(false);
      }
    }

    function resetChat() {
      apiMessages = [];
      document.getElementById('chatArea').innerHTML = '';

      // Re-add the empty state
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.id = 'emptyState';
      empty.innerHTML = `
        <div class="empty-icon">🥗</div>
        <h2>Consultor Nutricional</h2>
        <p>Faço triagem do seu perfil e entrego orientações baseadas em evidência. Não substituo nutricionista — indico quando encaminhar.</p>
        <div class="suggestion-grid">
          <button class="suggestion-btn" onclick="quickSend('Quero perder peso com saúde')">
            <span class="s-icon">⚖️</span>
            <span class="s-text">Perder peso com saúde</span>
          </button>
          <button class="suggestion-btn" onclick="quickSend('Quero ganhar massa muscular')">
            <span class="s-icon">💪</span>
            <span class="s-text">Ganhar massa muscular</span>
          </button>
          <button class="suggestion-btn" onclick="quickSend('Quero melhorar minha energia e disposição')">
            <span class="s-icon">⚡</span>
            <span class="s-text">Melhorar energia</span>
          </button>
          <button class="suggestion-btn" onclick="quickSend('Quero adotar uma alimentação plant-based')">
            <span class="s-icon">🌱</span>
            <span class="s-text">Alimentação plant-based</span>
          </button>
        </div>`;
      document.getElementById('chatArea').appendChild(empty);
    }

    // ── Send ──
    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('userInput');
      const text  = input.value.trim();
      if (!text) return;

      input.value = '';
      autoResize(input);
      hideEmptyState();

      appendUserBubble(text);
      apiMessages.push({ role: 'user', content: text });

      setSendLoading(true);
      showTyping();

      try {
        const reply = await streamBotMessage();
        apiMessages.push({ role: 'assistant', content: reply });
      } catch (err) {
        hideTyping();
        showError(err.message || 'Erro ao conectar com o servidor.');
      } finally {
        setSendLoading(false);
        input.focus();
      }
    }

    function quickSend(text) {
      document.getElementById('userInput').value = text;
      sendMessage();
    }

    // ── Streaming ──
    async function streamBotMessage() {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages })
      });

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.error || 'Erro no servidor');
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();

      // Create bot bubble that will fill progressively
      hideTyping();
      const { bubble, container } = createBotBubble();
      document.getElementById('chatArea').appendChild(container);

      let fullText = '';
      let buffer   = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (!raw || raw === '[DONE]') continue;

          try {
            const parsed = JSON.parse(raw);
            if (parsed.error) throw new Error(parsed.error);
            if (parsed.text) {
              fullText += parsed.text;
              bubble.innerHTML = renderMarkdown(fullText) || '&nbsp;';
              scrollBottom();
            }
          } catch (e) {
            if (e.message && !e.message.includes('JSON')) throw e;
          }
        }
      }

      return fullText;
    }

    // ── DOM helpers ──
    function hideEmptyState() {
      const el = document.getElementById('emptyState');
      if (el) el.remove();
    }

    function appendUserBubble(text) {
      const area = document.getElementById('chatArea');
      const wrap = document.createElement('div');
      wrap.className = 'msg user';
      wrap.innerHTML = `
        <div class="avatar">👤</div>
        <div class="bubble">${escHtml(text)}</div>`;
      area.appendChild(wrap);
      scrollBottom();
    }

    function createBotBubble() {
      const container = document.createElement('div');
      container.className = 'msg bot';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      container.innerHTML = '<div class="avatar">🥗</div>';
      container.appendChild(bubble);
      return { bubble, container };
    }

    function showTyping() {
      if (document.getElementById('typingEl')) return;
      const area = document.getElementById('chatArea');
      const el   = document.createElement('div');
      el.id        = 'typingEl';
      el.className = 'typing';
      el.innerHTML = `
        <div class="avatar" style="background:var(--primary)">🥗</div>
        <div class="typing-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>`;
      area.appendChild(el);
      scrollBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typingEl');
      if (el) el.remove();
    }

    function showError(msg) {
      const area = document.getElementById('chatArea');
      const el   = document.createElement('div');
      el.className = 'error-banner';
      el.innerHTML = `<span>⚠️</span><span>${escHtml(msg)}</span>`;
      area.appendChild(el);
      scrollBottom();
    }

    function setSendLoading(on) {
      isLoading = on;
      const btn = document.getElementById('sendBtn');
      btn.disabled = on;
      btn.innerHTML = on
        ? '<div class="spinner"></div>'
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
             <line x1="22" y1="2" x2="11" y2="13"/>
             <polygon points="22 2 15 22 11 13 2 9 22 2"/>
           </svg>`;
    }

    function scrollBottom() {
      const area = document.getElementById('chatArea');
      area.scrollTop = area.scrollHeight;
    }

    // ── Input auto-resize ──
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // ── Markdown renderer ──
    function renderMarkdown(src) {
      const lines  = src.split('\n');
      let html     = '';
      let inUl     = false;
      let inOl     = false;

      const closeLists = () => {
        if (inUl) { html += '</ul>'; inUl = false; }
        if (inOl) { html += '</ol>'; inOl = false; }
      };

      for (const line of lines) {
        if (/^[\s]*[-*•]\s+/.test(line)) {
          if (inOl) { html += '</ol>'; inOl = false; }
          if (!inUl) { html += '<ul>'; inUl = true; }
          html += `<li>${inl(line.replace(/^[\s]*[-*•]\s+/, ''))}</li>`;
          continue;
        }
        if (/^\s*\d+\.\s+/.test(line)) {
          if (inUl) { html += '</ul>'; inUl = false; }
          if (!inOl) { html += '<ol>'; inOl = true; }
          html += `<li>${inl(line.replace(/^\s*\d+\.\s+/, ''))}</li>`;
          continue;
        }
        closeLists();

        if      (line.startsWith('#### ')) html += `<h4>${inl(line.slice(5))}</h4>`;
        else if (line.startsWith('### '))  html += `<h4>${inl(line.slice(4))}</h4>`;
        else if (line.startsWith('## '))   html += `<h3>${inl(line.slice(3))}</h3>`;
        else if (line.startsWith('# '))    html += `<h2>${inl(line.slice(2))}</h2>`;
        else if (/^---+$/.test(line.trim())) html += '<hr>';
        else if (line.trim() === '')       html += '<br>';
        else                               html += `<p>${inl(line)}</p>`;
      }
      closeLists();
      return html;
    }

    // Inline formatting (bold, italic, code)
    function inl(t) {
      return esc(t)
        .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.*?)\*\*/g,     '<strong>$1</strong>')
        .replace(/__(.*?)__/g,         '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g,         '<em>$1</em>')
        .replace(/_(.*?)_/g,           '<em>$1</em>')
        .replace(/`(.*?)`/g,           '<code>$1</code>');
    }

    // Escape HTML (applied before inline markdown to avoid XSS)
    function esc(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escHtml(t) {
      return esc(t).replace(/\n/g, '<br>');
    }
  </script>
</body>
</html>
