# Blueprint do Render — sobe TrafegoAI com URL público.
# Como usar:
#   1. Faça push deste repositório para o seu GitHub (já está na PR #21).
#   2. Acesse https://dashboard.render.com/blueprints → "New Blueprint Instance".
#   3. Selecione o repo; o Render lê este arquivo e cria Postgres, Redis, API,
#      worker e o frontend. Clique em "Apply".
#   4. Ao final, a URL pública do frontend aparece no serviço "trafegoai-web".
#
# Observação: o plano free do Render hiberna serviços ociosos (a primeira
# requisição após ocioso demora ~30s). Para produção real, use planos pagos.

databases:
  - name: trafegoai-db
    databaseName: trafegoai
    user: trafegoai
    plan: free

services:
  # Redis (filas BullMQ + cache)
  - type: redis
    name: trafegoai-redis
    plan: free
    ipAllowList: [] # acessível apenas pelos serviços internos do Render

  # API NestJS — roda migrations + seed (se vazio) e sobe o servidor
  - type: web
    name: trafegoai-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    dockerCommand: sh -c "npx prisma migrate deploy && npm run seed:ifempty && node dist/src/main.js"
    healthCheckPath: /billing/plans
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: trafegoai-db, property: connectionString }
      - key: REDIS_URL
        fromService: { type: redis, name: trafegoai-redis, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true # 32+ chars; o app deriva a chave AES se não for hex de 32 bytes
      - key: PORT
        value: "4000"
      - key: SEED_ON_BOOT
        value: "true"
      # Opcionais — cole suas credenciais para ativar as integrações reais:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_ADS_CLIENT_ID
        sync: false
      - key: META_APP_ID
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  # Worker de jobs (sync de métricas + regras de automação)
  - type: worker
    name: trafegoai-worker
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    dockerCommand: node dist/src/jobs/worker.main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: trafegoai-db, property: connectionString }
      - key: REDIS_URL
        fromService: { type: redis, name: trafegoai-redis, property: connectionString }
      - key: TOKEN_ENCRYPTION_KEY
        fromService: { type: web, name: trafegoai-api, envVarKey: TOKEN_ENCRYPTION_KEY }

  # Frontend Next.js.
  # IMPORTANTE: NEXT_PUBLIC_API_URL é embutido em BUILD time. A URL da API só
  # existe após o primeiro deploy, então este valor fica manual:
  #   1. Aplique o blueprint (cria a API em https://trafegoai-api.onrender.com).
  #   2. No serviço "trafegoai-web" → Environment, defina
  #      NEXT_PUBLIC_API_URL = https://trafegoai-api.onrender.com
  #   3. "Manual Deploy" → "Clear build cache & deploy" para reconstruir o bundle.
  - type: web
    name: trafegoai-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # preencher com a URL pública da API após o 1º deploy (ver acima)
